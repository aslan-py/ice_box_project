name: CI/CD Pipeline для проекта ice-app
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать код на виртуальную машину.
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установить зависимости ruff
        run: |
          pip install ruff

      - name: Запустить проверку Ruff
        run: ruff check .

      - name: Войти в Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Собрать и отправить образ в Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ice-app:latest

      - name: Подключиться к серверу и обновить контейнер
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_KEY }}
          script: |
            cd /root/projects/
            docker compose pull ice-app ice-worker ice-flower
            docker compose up -d ice-app ice-worker ice-flower
            docker image prune -af
  send_message:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Отправить сообщение в ТГ
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: Деплой ice-app выполенен!